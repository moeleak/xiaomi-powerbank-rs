<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Xiaomi Powerbank</title>
    <base data-trunk-public-url />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #141218;
      }

      body {
        overflow: hidden;
      }

      canvas {
        display: block;
      }

    <link
      data-trunk
      rel="rust"
      href="../Cargo.toml"

      data-wasm-opt="z"
      data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int --strip-debug --strip-producers"
    />
  </head>
  <body></body>
